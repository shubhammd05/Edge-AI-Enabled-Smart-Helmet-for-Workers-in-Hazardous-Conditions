<!DOCTYPE html>
<html>
<head>
    <title>Helmet Config</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; padding: 15px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h2>WiFi Configuration</h2>
    <form action="/save" method="POST">
        <input type="text" name="ssid" placeholder="Network Name" required>
        <input type="password" name="pass" placeholder="Password" required>
        <button type="submit">Save and Connect</button>
    </form>
</body>
</html>
